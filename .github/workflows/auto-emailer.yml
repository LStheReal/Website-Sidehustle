name: Auto Emailer

# Runs the follow-up auto-emailer daily at 07:00 UTC (08:00 Zurich winter, 09:00 Zurich summer).
# Can also be triggered manually from the GitHub UI → Actions → "Auto Emailer" → "Run workflow".

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no emails sent, no sheet updates)'
        type: boolean
        default: false
      lead_id:
        description: 'Process only this lead_id (optional)'
        type: string
        default: ''

jobs:
  send-followups:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: 'Website Builder'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'Website Builder/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run auto_emailer
        env:
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          LEADS_SHEET_ID: ${{ secrets.LEADS_SHEET_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SENDER_NAME: ${{ secrets.SENDER_NAME }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PHONE: ${{ secrets.SENDER_PHONE }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ github.event.inputs.lead_id }}" ]; then
            ARGS="$ARGS --lead-id ${{ github.event.inputs.lead_id }}"
          fi
          python execution/auto_emailer.py $ARGS

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auto-emailer-logs-${{ github.run_id }}
          path: 'Website Builder/logs/'
          if-no-files-found: ignore
          retention-days: 30
