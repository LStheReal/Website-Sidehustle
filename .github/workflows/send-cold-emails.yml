name: Send Cold Emails (Day 0)

# Runs every Tuesday at 07:00 UTC = 08:00 Zurich (winter) / 09:00 Zurich (summer).
# Finds all leads with status "website_created" + email + draft URLs and sends
# the Day 0 cold intro email. No new leads are built — only already-ready ones.
#
# Can also be triggered manually from GitHub UI → Actions → "Send Cold Emails" → Run workflow.

on:
  schedule:
    - cron: '0 7 * * 2'   # every Tuesday at 07:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no emails sent, no sheet updates)'
        type: boolean
        default: false
      lead_id:
        description: 'Process only this lead_id (optional, for testing)'
        type: string
        default: ''

jobs:
  send-cold-emails:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: 'Website Builder'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'Website Builder/requirements.txt'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write service account credentials
        run: echo '${{ secrets.GOOGLE_CREDENTIALS_JSON }}' > /tmp/service_account.json

      - name: Run send_first_emails
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/service_account.json
          LEADS_SHEET_ID: ${{ secrets.LEADS_SHEET_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SENDER_NAME: ${{ secrets.SENDER_NAME }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PHONE: ${{ secrets.SENDER_PHONE }}
          FROM_NAME: freshNew
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ github.event.inputs.lead_id }}" ]; then
            ARGS="$ARGS --lead-id ${{ github.event.inputs.lead_id }}"
          fi
          python execution/send_first_emails.py $ARGS

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: send-cold-emails-logs-${{ github.run_id }}
          path: 'Website Builder/logs/'
          if-no-files-found: ignore
          retention-days: 30
