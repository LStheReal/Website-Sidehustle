<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g2Bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F2E8E2"/>
      <stop offset="100%" stop-color="#E4D8CE"/>
    </linearGradient>
    <radialGradient id="g2Glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FAF4EE" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="g2B1"><feGaussianBlur stdDeviation="30"/></filter>
    <filter id="g2B2"><feGaussianBlur stdDeviation="12"/></filter>
    <filter id="g2B3"><feGaussianBlur stdDeviation="4"/></filter>
  </defs>

  <!-- Light linen background -->
  <rect width="800" height="600" fill="url(#g2Bg)"/>
  <rect width="800" height="600" fill="url(#g2Glow)"/>

  <!-- Linen texture -->
  <g opacity="0.04" stroke="#B8A898" fill="none">
    <line x1="0" y1="15" x2="800" y2="15" stroke-width="0.5"/>
    <line x1="0" y1="35" x2="800" y2="35" stroke-width="0.5"/>
    <line x1="0" y1="55" x2="800" y2="55" stroke-width="0.5"/>
    <line x1="0" y1="75" x2="800" y2="75" stroke-width="0.5"/>
    <line x1="0" y1="95" x2="800" y2="95" stroke-width="0.5"/>
    <line x1="0" y1="115" x2="800" y2="115" stroke-width="0.5"/>
    <line x1="0" y1="135" x2="800" y2="135" stroke-width="0.5"/>
    <line x1="0" y1="155" x2="800" y2="155" stroke-width="0.5"/>
    <line x1="0" y1="175" x2="800" y2="175" stroke-width="0.5"/>
    <line x1="0" y1="195" x2="800" y2="195" stroke-width="0.5"/>
    <line x1="0" y1="215" x2="800" y2="215" stroke-width="0.5"/>
    <line x1="0" y1="235" x2="800" y2="235" stroke-width="0.5"/>
    <line x1="0" y1="255" x2="800" y2="255" stroke-width="0.5"/>
    <line x1="0" y1="275" x2="800" y2="275" stroke-width="0.5"/>
    <line x1="0" y1="295" x2="800" y2="295" stroke-width="0.5"/>
    <line x1="0" y1="315" x2="800" y2="315" stroke-width="0.5"/>
    <line x1="0" y1="335" x2="800" y2="335" stroke-width="0.5"/>
    <line x1="0" y1="355" x2="800" y2="355" stroke-width="0.5"/>
    <line x1="0" y1="375" x2="800" y2="375" stroke-width="0.5"/>
    <line x1="0" y1="395" x2="800" y2="395" stroke-width="0.5"/>
    <line x1="0" y1="415" x2="800" y2="415" stroke-width="0.5"/>
    <line x1="0" y1="435" x2="800" y2="435" stroke-width="0.5"/>
    <line x1="0" y1="455" x2="800" y2="455" stroke-width="0.5"/>
    <line x1="0" y1="475" x2="800" y2="475" stroke-width="0.5"/>
    <line x1="0" y1="495" x2="800" y2="495" stroke-width="0.5"/>
    <line x1="0" y1="515" x2="800" y2="515" stroke-width="0.5"/>
    <line x1="0" y1="535" x2="800" y2="535" stroke-width="0.5"/>
    <line x1="0" y1="555" x2="800" y2="555" stroke-width="0.5"/>
    <line x1="0" y1="575" x2="800" y2="575" stroke-width="0.5"/>
  </g>

  <!-- Abstract product-like rounded shapes — minimal, elegant -->
  <!-- Tall bottle silhouette -->
  <g opacity="0.2" filter="url(#g2B3)">
    <rect x="180" y="150" width="50" height="260" rx="12" fill="#C4B0A0"/>
    <rect x="192" y="120" width="26" height="40" rx="6" fill="#B8A494"/>
    <rect x="196" y="108" width="18" height="16" rx="5" fill="#A89484"/>
  </g>

  <!-- Round bottle -->
  <g opacity="0.18" filter="url(#g2B3)">
    <ellipse cx="380" cy="340" rx="55" ry="65" fill="#C8A880"/>
    <rect x="362" y="260" width="36" height="30" rx="5" fill="#B8986C"/>
    <rect x="366" y="248" width="28" height="16" rx="8" fill="#A88860"/>
  </g>

  <!-- Small jar -->
  <g opacity="0.2" filter="url(#g2B3)">
    <rect x="530" y="310" width="90" height="60" rx="14" fill="#E0D4CA"/>
    <rect x="526" y="290" width="98" height="24" rx="8" fill="#D4C8BC"/>
    <rect x="535" y="278" width="80" height="16" rx="6" fill="#C8B8AC"/>
  </g>

  <!-- Dropper bottle -->
  <g opacity="0.16" filter="url(#g2B3)">
    <rect x="650" y="200" width="40" height="200" rx="10" fill="#D0C0B0"/>
    <rect x="660" y="165" width="20" height="45" rx="5" fill="#C0ACA0"/>
    <circle cx="670" cy="160" r="10" fill="#B8A498"/>
  </g>

  <!-- Eucalyptus/botanical stems -->
  <g opacity="0.18">
    <path d="M80,30 Q90,120 85,250 Q80,380 95,520 Q100,570 92,600" stroke="#98887A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="96" cy="100" rx="16" ry="7" fill="#A0907A" opacity="0.6" transform="rotate(18 96 100)"/>
    <ellipse cx="80" cy="180" rx="14" ry="6" fill="#A0907A" opacity="0.55" transform="rotate(-12 80 180)"/>
    <ellipse cx="90" cy="270" rx="15" ry="6.5" fill="#A0907A" opacity="0.5" transform="rotate(10 90 270)"/>
    <ellipse cx="83" cy="360" rx="13" ry="5.5" fill="#A0907A" opacity="0.45" transform="rotate(-8 83 360)"/>
    <ellipse cx="92" cy="440" rx="14" ry="6" fill="#A0907A" opacity="0.4" transform="rotate(15 92 440)"/>
  </g>

  <!-- Soft shadow beneath objects -->
  <ellipse cx="210" cy="430" rx="45" ry="8" fill="#C0B0A0" opacity="0.15" filter="url(#g2B2)"/>
  <ellipse cx="380" cy="420" rx="50" ry="8" fill="#C0B0A0" opacity="0.12" filter="url(#g2B2)"/>
  <ellipse cx="575" cy="385" rx="55" ry="8" fill="#C0B0A0" opacity="0.12" filter="url(#g2B2)"/>
  <ellipse cx="670" cy="415" rx="35" ry="6" fill="#C0B0A0" opacity="0.1" filter="url(#g2B2)"/>

  <!-- Scattered petals -->
  <g opacity="0.12">
    <ellipse cx="300" cy="500" rx="14" ry="8" fill="#D09098" transform="rotate(25 300 500)"/>
    <ellipse cx="500" cy="480" rx="11" ry="6" fill="#C88890" transform="rotate(-20 500 480)"/>
    <ellipse cx="450" cy="150" rx="10" ry="5.5" fill="#D09098" transform="rotate(35 450 150)"/>
  </g>
</svg>